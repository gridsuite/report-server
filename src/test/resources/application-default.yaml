spring:
  jpa:
    database: H2
    properties:
      dialect: org.hibernate.dialect.H2Dialect
      hibernate.format_sql: true

logging:
  level:
    org.springframework.orm.jpa: INFO
    org.springframework.transaction: INFO
    org.hibernate.SQL: INFO
    org.hibernate.orm.jdbc.bind: INFO
    net.ttddyy.dsproxy.listener.logging.SLF4JQueryLoggingListener: WARN

powsybl-ws:
  database:
    vendor: h2:mem
    # H2 checks FK constraints row-by-row (unlike PostgreSQL which checks at statement end).
    # Disabling referential integrity prevents false FK violations when deleting a report_node tree.
    query: ;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;REFERENTIAL_INTEGRITY=FALSE
    hostPort: ":"
